<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
  <style>
    body { font-family: Arial; padding: 20px; background-color: #f4f4f9; }
    ul { list-style: none; padding: 0; }
    li { padding: 8px; background: #fff; margin-bottom: 5px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); width: fit-content; }
    #form { display: flex; margin-top: 20px; }
    #input { flex-grow: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; margin-right: 10px;}
    button { padding: 10px 20px; font-size: 16px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <ul id="messages"></ul>
  <form id="form">
    <input id="input" autocomplete="off" placeholder="Type a message..." required />
    <button>Send</button>
  </form>

  <script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const messages = document.getElementById('messages');

  // Generate a random, slightly darker color for this user's session
  const hue = Math.floor(Math.random() * 360);
  const myColor = `hsl(${hue}, 70%, 40%)`;

  // Send the message and the color
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    if (input.value) {
      socket.emit('chat message', { 
        text: input.value, 
        color: myColor 
      });
      input.value = '';
    }
  });

  // Receive the message
// Receive the message
socket.on('chat message', (msg) => {
  // 1. Put the text on the screen
  const item = document.createElement('li');
  item.textContent = msg;
  messages.appendChild(item);
  window.scrollTo(0, document.body.scrollHeight);

  // 2. Make the browser speak the text
  const speech = new SpeechSynthesisUtterance(msg);
  speech.lang = 'en-US'; // Force English pronunciation
  
  // Optional: You can change the pitch or speed to make it sound a bit more robotic/synthetic
  speech.pitch = 1.5; 
  speech.rate = 1.2;  

  window.speechSynthesis.speak(speech);
});
</script>
