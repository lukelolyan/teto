<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App with VOICEVOX</title>
  <!-- Load WanaKana.js to automatically convert English/Romaji text into Katakana -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wanakana/5.1.2/wanakana.min.js"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 0; 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
      background-color: #f4f4f9; 
    }
    #messages { 
      list-style-type: none; 
      margin: 0; 
      padding: 20px; 
      flex-grow: 1; 
      overflow-y: auto; 
    }
    #messages li { 
      padding: 10px; 
      margin-bottom: 10px; 
      background: #fff; 
      border-radius: 8px; 
      box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
      width: fit-content;
      max-width: 70%;
      word-break: break-word;
    }
    #form { 
      display: flex; 
      padding: 10px; 
      background: #333; 
    }
    #input { 
      flex-grow: 1; 
      padding: 10px; 
      border: none; 
      border-radius: 4px; 
      margin-right: 10px; 
      font-size: 16px; 
    }
    button { 
      padding: 10px 20px; 
      background: #28a745; 
      color: white; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 16px; 
    }
    button:hover { 
      background: #218838; 
    }
  </style>
</head>
<body>

  <ul id="messages"></ul>
  
  <form id="form" action="">
    <input id="input" autocomplete="off" placeholder="Type a message (English/Romaji auto-converts to Katakana)..." required />
    <button>Send</button>
  </form>

  <!-- Load Socket.IO client library supplied by our backend server -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');

    // Generate a unique random ID for this specific browser tab session
    const myClientId = Math.random().toString(36).substring(2, 10);
    
    // VOICEVOX default local API address
    const VOICEVOX_URL = "http://127.0.0.1:50021"; 

    // 1. Submit message to server with your specific senderId attached
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (input.value) {
        socket.emit('chat message', { 
          senderId: myClientId, 
          text: input.value 
        });
        input.value = '';
      }
    });

    // 2. Hear back from the server when anyone (including you) sends a message
    socket.on('chat message', async (data) => {
      
      // Print the incoming message to the DOM list
      const item = document.createElement('li');
      item.textContent = data.text;
      messages.appendChild(item);
      window.scrollTo(0, document.body.scrollHeight);

      // 3. VOICEVOX Triggers: ONLY process if the message is from the *other* user
      if (data.senderId !== myClientId) {
        try {
          // Automatically convert any English/Romaji characters to Katakana for correct pronunciation
          let speechText = data.text;
          if (wanakana.isRomaji(speechText)) {
            speechText = wanakana.toKatakana(speechText);
          }

          // Step A: Request the pronunciation query from VOICEVOX for Speaker 2
          const queryRes = await fetch(`${VOICEVOX_URL}/audio_query?text=${encodeURIComponent(speechText)}&speaker=2`, {
            method: 'POST'
          });
          const queryJson = await queryRes.json();

          // Step B: Submit the audio configuration data to synthesize the WAV data using Speaker 2
          const synthRes = await fetch(`${VOICEVOX_URL}/synthesis?speaker=2`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(queryJson)
          });
          
          // Step C: Receive the audio binary data blob, map it to a URI, and play it
          const audioBlob = await synthRes.blob();
          const audioUrl = URL.createObjectURL(audioBlob);
          const audio = new Audio(audioUrl);
          audio.play();

        } catch (err) {
          console.error("VOICEVOX Error: Is the desktop engine running on your machine?", err);
        }
      }
    });
  </script>
</body>
</html>
